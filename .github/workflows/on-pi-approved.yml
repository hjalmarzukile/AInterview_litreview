name: Finalize issue on PI approval

on:
  issues:
    types: [labeled]

jobs:
  finalize-on-approval:
    if: github.event.label.name == 'pi-approved'
    runs-on: ubuntu-latest
    steps:
      - name: Close issue and archive task file
        env:
          GH_TOKEN: ${{ secrets.ORG_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ASSIGNEE: ${{ github.event.issue.assignee.login }}
          REPO: ${{ github.repository }}
        run: |
          # Close the issue
          curl -s -X PATCH \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}" \
            -d '{"state": "closed"}'

          # Comment confirming approval
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            -d "{\"body\": \"PI approved. Issue closed. Great work @${ASSIGNEE}.\"}"

          # Archive task file in student inbox
          INBOX_REPO="hjalmarzukile/inbox-${ASSIGNEE}"
          SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c1-40)
          FILENAME="${ISSUE_NUMBER}_${SLUG}.md"

          FILE_DATA=$(curl -s \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${INBOX_REPO}/contents/tasks/open/${FILENAME}")
          SHA=$(echo "$FILE_DATA" | python3 -c "import json,sys; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null)
          CONTENT=$(echo "$FILE_DATA" | python3 -c "import json,sys; print(json.load(sys.stdin).get('content',''))" 2>/dev/null)

          if [ -n "$SHA" ]; then
            curl -s -X PUT \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${INBOX_REPO}/contents/tasks/done/${FILENAME}" \
              -d "{\"message\": \"task: close #${ISSUE_NUMBER} — pi-approved\", \"content\": \"${CONTENT}\"}"

            curl -s -X DELETE \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${INBOX_REPO}/contents/tasks/open/${FILENAME}" \
              -d "{\"message\": \"task: archive #${ISSUE_NUMBER} from open\", \"sha\": \"${SHA}\"}"
          fi
